<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Calculator</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black min-h-screen flex items-center justify-center p-4">

    <div class="bg-gray-900 rounded-3xl shadow-2xl p-6 w-full max-w-sm">

        <h1 class="text-3xl font-bold mb-6 text-left text-white">CASCO</h1>
        <!-- Display -->
        <div class="bg-gray-800 rounded-2xl p-4 mb-6 shadow-inner">
            <div id="display" class="text-white text-right text-4xl font-light overflow-hidden whitespace-nowrap">
                0
            </div>
        </div>

        <!-- Buttons -->
        <div class="grid grid-cols-4 gap-3">

            <!-- Row 1 -->
            <button onclick="clearDisplay()"
                class="bg-gray-600 hover:bg-gray-500 text-white py-4 rounded-xl col-span-2">AC</button>

            <button onclick="deleteLast()" class="bg-gray-600 hover:bg-gray-500 text-white py-4 rounded-xl">DEL</button>

            <button onclick="appendOperator('/')"
                class="bg-orange-500 hover:bg-orange-400 text-white py-4 rounded-xl">÷</button>

            <!-- Row 2 -->
            <button onclick="appendNumber('7')"
                class="bg-gray-700 hover:bg-gray-600 text-white py-4 rounded-xl">7</button>

            <button onclick="appendNumber('8')"
                class="bg-gray-700 hover:bg-gray-600 text-white py-4 rounded-xl">8</button>

            <button onclick="appendNumber('9')"
                class="bg-gray-700 hover:bg-gray-600 text-white py-4 rounded-xl">9</button>

            <button onclick="appendOperator('*')"
                class="bg-orange-500 hover:bg-orange-400 text-white py-4 rounded-xl">×</button>

            <!-- Row 3 -->
            <button onclick="appendNumber('4')"
                class="bg-gray-700 hover:bg-gray-600 text-white py-4 rounded-xl">4</button>

            <button onclick="appendNumber('5')"
                class="bg-gray-700 hover:bg-gray-600 text-white py-4 rounded-xl">5</button>

            <button onclick="appendNumber('6')"
                class="bg-gray-700 hover:bg-gray-600 text-white py-4 rounded-xl">6</button>

            <button onclick="appendOperator('-')"
                class="bg-orange-500 hover:bg-orange-400 text-white py-4 rounded-xl">−</button>

            <!-- Row 4 -->
            <button onclick="appendNumber('1')"
                class="bg-gray-700 hover:bg-gray-600 text-white py-4 rounded-xl">1</button>

            <button onclick="appendNumber('2')"
                class="bg-gray-700 hover:bg-gray-600 text-white py-4 rounded-xl">2</button>

            <button onclick="appendNumber('3')"
                class="bg-gray-700 hover:bg-gray-600 text-white py-4 rounded-xl">3</button>

            <button onclick="appendOperator('+')"
                class="bg-orange-500 hover:bg-orange-400 text-white py-4 rounded-xl">+</button>

            <!-- Row 5 -->
            <button onclick="appendNumber('0')"
                class="bg-gray-700 hover:bg-gray-600 text-white py-4 rounded-xl col-span-2">0</button>

            <button onclick="appendNumber('.')"
                class="bg-gray-700 hover:bg-gray-600 text-white py-4 rounded-xl">.</button>

            <button onclick="calculate()" class="bg-green-500 hover:bg-green-400 text-white py-4 rounded-xl">=</button>

        </div>

    </div>

    <script>
        let display = document.getElementById("display");

        let currentValue = "0";
        let previousValue = "";
        let operation = null;
        let shouldResetDisplay = false;

        function updateDisplay() {
            display.textContent = currentValue;
        }

        function appendNumber(number) {

            if (shouldResetDisplay) {
                currentValue = number;
                shouldResetDisplay = false;
            } else {

                if (currentValue === "0" && number !== ".") {
                    currentValue = number;
                } else {

                    if (number === "." && currentValue.includes(".")) {
                        return;
                    }

                    currentValue += number;
                }
            }

            updateDisplay();
        }

        function appendOperator(op) {

            if (operation !== null && !shouldResetDisplay) {
                calculate();
            }

            previousValue = currentValue;
            operation = op;
            shouldResetDisplay = true;
        }

        function calculate() {

            if (operation === null || shouldResetDisplay) {
                return;
            }

            const prev = parseFloat(previousValue);
            const current = parseFloat(currentValue);

            let result;

            switch (operation) {

                case "+":
                    result = prev + current;
                    break;

                case "-":
                    result = prev - current;
                    break;

                case "*":
                    result = prev * current;
                    break;

                case "/":

                    if (current === 0) {
                        alert("Cannot divide by zero!");
                        clearDisplay();
                        return;
                    }

                    result = prev / current;
                    break;

                default:
                    return;
            }

            currentValue = (Math.round(result * 100000000) / 100000000).toString();

            operation = null;
            shouldResetDisplay = true;

            updateDisplay();
        }

        function clearDisplay() {

            currentValue = "0";
            previousValue = "";
            operation = null;
            shouldResetDisplay = false;

            updateDisplay();
        }

        function deleteLast() {

            if (currentValue.length > 1) {
                currentValue = currentValue.slice(0, -1);
            } else {
                currentValue = "0";
            }

            updateDisplay();
        }

        // Keyboard Support
        document.addEventListener("keydown", function (event) {

            if (event.key >= "0" && event.key <= "9") {
                appendNumber(event.key);

            } else if (event.key === ".") {
                appendNumber(".");

            } else if (
                event.key === "+" ||
                event.key === "-" ||
                event.key === "*" ||
                event.key === "/"
            ) {
                appendOperator(event.key);

            } else if (event.key === "Enter" || event.key === "=") {
                event.preventDefault();
                calculate();

            } else if (event.key === "Escape") {
                clearDisplay();

            } else if (event.key === "Backspace") {
                event.preventDefault();
                deleteLast();
            }

        });
    </script>

</body>

</html>
